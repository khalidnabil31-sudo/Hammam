<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farah & Hammam 💍</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        :root { 
            --cream: #FCEFF1; 
            --gold: #DCA29A; /* Rose Gold */
            --gold-light: #F8D7DA; /* Blush Pink */
            --deep-red: #DCA29A; 
            --bg-dark: #071D39; /* Navy Dark */
            --bg-mid: #0F2D52; /* Navy Card */
            --env-body: #0F2D52; 
            --env-flap: #133863; 
            --env-shadow: rgba(0,0,0,0.6); 
        }
        body { background: var(--bg-dark); font-family: 'Cormorant Garamond', serif; overflow-x: hidden; }
        #stars-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        
        #vinyl-wrapper { position: fixed; top: 18px; right: 18px; z-index: 600; opacity: 0; transform: scale(0.5) rotate(-20deg); transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.34,1.4,0.64,1); cursor: pointer; }
        #vinyl-wrapper.visible { opacity: 1; transform: scale(1) rotate(0deg); }
        .vinyl-disc { width: 78px; height: 78px; border-radius: 50%; background: radial-gradient(circle, #DCA29A 0%, #a87c2a 8%, #7a5c1a 10%, #0f0f0f 11%, #1e1e1e 15%, #0f0f0f 16%, #1e1e1e 22%, #0f0f0f 23%, #1e1e1e 30%, #0f0f0f 31%, #1e1e1e 39%, #0f0f0f 40%, #1e1e1e 50%, #0f0f0f 51%, #1e1e1e 62%, #0f0f0f 63%, #1e1e1e 76%, #0f0f0f 77%, #0a0a0a 100%); box-shadow: 0 6px 28px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.04), inset 0 2px 4px rgba(255,255,255,0.04); animation: vinylSpin 2.2s linear infinite; animation-play-state: paused; position: relative; transition: box-shadow 0.3s ease; }
        .vinyl-disc:hover { box-shadow: 0 8px 35px rgba(220,162,154,0.35), 0 0 0 1px rgba(220,162,154,0.2); }
        .vinyl-disc.spinning { animation-play-state: running; }
        @keyframes vinylSpin { to { transform: rotate(360deg); } }
        .vinyl-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; border-radius: 50%; background: radial-gradient(circle at 38% 32%, #F8D7DA, #DCA29A 50%, #8b6014); display: flex; align-items: center; justify-content: center; box-shadow: inset 0 1px 3px rgba(0,0,0,0.3); }
        .vinyl-label span { font-family: 'Playfair Display', serif; font-size: 5.5px; color: #071D39; font-weight: 700; letter-spacing: 0.3px; line-height: 1.2; text-align: center; }
        .vinyl-needle { position: absolute; top: 2px; right: -14px; width: 34px; height: 2.5px; background: linear-gradient(to left, #888, #ddd, #aaa); transform-origin: right center; transform: rotate(20deg); border-radius: 2px; transition: transform 0.6s ease; }
        .vinyl-needle::before { content: ''; position: absolute; right: -1px; top: -5px; width: 12px; height: 12px; border-radius: 50%; background: radial-gradient(circle at 40% 35%, #ccc, #888); }
        .vinyl-needle::after { content: ''; position: absolute; left: 0; top: -1px; width: 5px; height: 4px; background: #c0a020; border-radius: 1px; }
        #vinyl-wrapper:not(.playing) .vinyl-needle { transform: rotate(0deg); }
        .vinyl-icon { text-align: center; font-size: 0.6rem; color: rgba(220,162,154,0.6); letter-spacing: 1px; margin-top: 5px; font-family: 'Cormorant Garamond', serif; }

        #envelope-screen { position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 40%, #0F2D52 0%, var(--bg-dark) 75%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 500; transition: transform 1.4s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.7s ease 0.9s; }
        #envelope-screen.away { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .hint { font-family: 'Cormorant Garamond', serif; color: rgba(248,215,218,0.6); font-size: 0.82rem; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 2.8rem; animation: breathe 2.8s ease-in-out infinite; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        @keyframes breathe { 0%,100% { opacity: 0.35; transform: translateY(0); } 50% { opacity: 0.9; transform: translateY(-5px); } }

        .env-wrapper { position: relative; width: 420px; height: 280px; cursor: pointer; perspective: 1300px; user-select: none; -webkit-tap-highlight-color: transparent; }
        .env-body { position: absolute; inset: 0; background: var(--env-body); border-radius: 12px; box-shadow: 0 30px 70px var(--env-shadow), 0 0 0 1px rgba(248,215,218,0.15), inset 0 1px 0 rgba(255,255,255,0.1); z-index: 1; }
        .letter-inner { position: absolute; bottom: 8px; left: 18px; right: 18px; height: 68%; background: linear-gradient(155deg, #FCEFF1 0%, #F8D7DA 100%); border-radius: 8px; z-index: 3; transition: transform 1.05s cubic-bezier(0.34, 1.4, 0.64, 1) 0.55s; box-shadow: 0 2px 14px rgba(0,0,0,0.13); display: flex; align-items: center; justify-content: center; }
        .letter-inner::before { content: '💍'; font-size: 2rem; opacity: 0.35; }
        .env-wrapper.opening .letter-inner { transform: translateY(-115px); }
        .env-flap { position: absolute; top: 0; left: 0; width: 100%; height: 56%; background: var(--env-flap); clip-path: polygon(0 0, 100% 0, 50% 92%); transform-origin: top center; transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1) 0.12s; z-index: 10; border-radius: 12px 12px 0 0; }
        .env-wrapper.opening .env-flap { transform: rotateX(-172deg); }

        .wax-seal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 75px; height: 75px; z-index: 20; }
        .seal-disc { width: 100%; height: 100%; background: radial-gradient(circle at 37% 30%, #FCEFF1 0%, #F8D7DA 42%, #DCA29A 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(0,0,0,0.4), 0 2px 5px rgba(0,0,0,0.3), inset 0 2px 8px rgba(255,255,255,0.25); position: relative; transition: transform 0.3s ease; border: 1px solid #DCA29A; }
        .seal-disc::before { content: ''; position: absolute; inset: 5px; border-radius: 50%; border: 1px solid rgba(7,29,57,0.15); }
        .seal-disc::after { content: ''; position: absolute; inset: 10px; border-radius: 50%; border: 1px solid rgba(7,29,57,0.1); }
        .seal-disc:hover { transform: scale(1.06); }
        .seal-label { font-family: 'Playfair Display', serif; color: #071D39; font-size: 0.64rem; letter-spacing: 0.5px; text-align: center; line-height: 1.45; position: relative; z-index: 1; font-weight: bold; }
        .env-wrapper.opening .wax-seal { animation: crackSeal 0.5s ease forwards; }
        @keyframes crackSeal { 0% { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity: 1; } 25% { transform: translate(-50%,-50%) scale(1.18) rotate(9deg); } 55% { transform: translate(-50%,-50%) scale(0.8) rotate(-6deg); opacity: 0.7; } 85% { transform: translate(-50%,-50%) scale(0.4) rotate(15deg); opacity: 0.2; } 100% { transform: translate(-50%,-50%) scale(0) rotate(22deg); opacity: 0; } }

        .confetti-piece { position: fixed; pointer-events: none; z-index: 9999; top: -20px; animation: confettiFall linear forwards; }
        @keyframes confettiFall { to { transform: translateY(110vh) rotate(760deg); opacity: 0; } }

        .petal { position: fixed; top: -40px; pointer-events: none; z-index: 50; border-radius: 0% 60% 0% 60%; animation: petalFall linear forwards; }
        @keyframes petalFall { to { transform: translateY(115vh) translateX(var(--drift,0px)) rotate(var(--spin,360deg)); opacity: 0.25; } }

        .map-card { background: linear-gradient(135deg, #0F2D52 0%, #071D39 100%); border-radius: 14px; padding: 1.4rem; box-shadow: 0 22px 55px rgba(0,0,0,0.45); border: 2px solid rgba(248,215,218,0.2); position: relative; overflow: hidden; }
        .map-card svg { width: 100%; height: auto; display: block; }
        .map-link { display: inline-block; margin-top: 1.4rem; padding: 0.85rem 2.6rem; background: linear-gradient(135deg, #F8D7DA, #DCA29A); color: #071D39; font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; border-radius: 8px; text-decoration: none; transition: transform 0.25s ease, box-shadow 0.25s ease; }
        .map-link:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(248,215,218,0.3); }

        #invite-page { position: relative; z-index: 1; min-height: 100vh; background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-mid) 35%, var(--bg-dark) 100%); opacity: 0; transition: opacity 1.3s ease 0.5s; }
        #invite-page.visible { opacity: 1; }
        .invite-inner { max-width: 700px; margin: 0 auto; padding: 6rem 2rem 5rem; }
        .reveal { opacity: 0; transform: translateY(30px); transition: opacity 1s ease, transform 1s ease; }
        .reveal.shown { opacity: 1; transform: translateY(0); }
        .ornament { display: flex; align-items: center; gap: 16px; margin: 2.5rem 0; }
        .ornament-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(248,215,218,0.3), transparent); }
        .ornament-dot { color: var(--gold); font-size: 0.65rem; opacity: 0.65; }
        .eyebrow { font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 0.78rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 300; text-align: center; }
        .hero-names { font-family: 'Dancing Script', cursive; color: var(--cream); font-size: clamp(3.8rem, 12vw, 5.8rem); line-height: 1.0; text-align: center; text-shadow: 0 0 60px rgba(248,215,218,0.15); }
        .and-word { font-family: 'Playfair Display', serif; font-style: italic; color: var(--gold); font-size: 1.9rem; display: block; margin: 0.1rem 0; }
        .ring-float { font-size: 3rem; display: block; text-align: center; margin: 1.3rem 0; animation: floatRing 4s ease-in-out infinite; }
        @keyframes floatRing { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-12px) rotate(4deg); } }
        .hero-sub { text-align: center; font-family: 'Cormorant Garamond', serif; color: rgba(247,238,223,0.6); letter-spacing: 5px; text-transform: uppercase; margin-top: 0.8rem; }
        .story-card { position: relative; background: rgba(255,255,255,0.02); border: 1px solid rgba(248,215,218,0.15); border-radius: 12px; padding: 2.5rem 2.8rem; overflow: hidden; }
        .story-card::before { content: '\201C'; position: absolute; top: -35px; left: 8px; font-family: 'Playfair Display', serif; font-size: 11rem; color: rgba(248,215,218,0.05); line-height: 1; pointer-events: none; }
        .story-text { font-family: 'Cormorant Garamond', serif; color: rgba(247,238,223,0.85); font-size: 1.25rem; line-height: 2.05; font-style: italic; }
        .story-text strong { color: var(--gold-light); font-style: normal; font-weight: 600; }
        .section-title { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 1.65rem; font-weight: 400; text-align: center; margin-bottom: 1.6rem; }
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .detail-item { background: linear-gradient(135deg, rgba(248,215,218,0.05), rgba(248,215,218,0.01)); border: 1px solid rgba(248,215,218,0.15); border-radius: 12px; padding: 1.4rem 1.7rem; }
        .detail-label { font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 0.72rem; letter-spacing: 3.5px; text-transform: uppercase; margin-bottom: 0.45rem; }
        .detail-value { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 1.12rem; }
        .rsvp-card { background: rgba(15, 45, 82, 0.4); border: 1px solid rgba(248,215,218,0.2); border-radius: 12px; padding: 2.8rem; text-align: center; }
        .rsvp-title { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 1.75rem; font-weight: 400; margin-bottom: 1rem; }
        .rsvp-note { font-family: 'Cormorant Garamond', serif; color: rgba(247,238,223,0.65); font-size: 1.1rem; font-style: italic; line-height: 1.9; margin-bottom: 2rem; }
        .rsvp-note strong { color: rgba(247,238,223,0.9); font-style: normal; }
        .btn-rsvp { display: inline-block; padding: 0.9rem 3.3rem; background: linear-gradient(135deg, #F8D7DA, #DCA29A); color: #071D39; font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.25s ease, box-shadow 0.25s ease; }
        .btn-rsvp:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(248,215,218,0.25); }
        .btn-rsvp.clicked { background: linear-gradient(135deg, #FCEFF1, #F8D7DA); color: #071D39; cursor: default; }

        .footer-sig { font-family: 'Dancing Script', cursive; color: rgba(248,215,218,0.4); font-size: 1.5rem; text-align: center; padding: 1.5rem 0 4rem; }
        .romantic-box { text-align: center; padding: 1rem 0; }
        .romantic-quote { font-family: 'Playfair Display', serif; font-style: italic; color: rgba(247,238,223,0.9); font-size: clamp(1.2rem, 3vw, 1.55rem); line-height: 1.85; font-weight: 400; }
        .romantic-quote em { color: var(--gold-light); font-style: normal; }
        .game-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(248,215,218,0.15); border-radius: 12px; padding: 2.2rem; text-align: center; }
        .game-title { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 1.4rem; font-weight: 400; margin-bottom: 0.5rem; }
        .game-subtitle { font-family: 'Cormorant Garamond', serif; color: rgba(247,238,223,0.5); font-size: 0.95rem; font-style: italic; margin-bottom: 2rem; }
        .game-start-btn, .play-again-btn { display: inline-block; padding: 0.8rem 2rem; background: linear-gradient(135deg, #F8D7DA, #DCA29A); color: #071D39; font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; letter-spacing: 2px; text
