<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation</title>
  <style>
    /* Premium Navy & Pink Gradient Background */
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      /* Rich blending of deep luxury navy and elegant rose pink accents */
      background: linear-gradient(135deg, #0B132B 0%, #1C2541 40%, #D4A373 70%, #F4ACB7 100%);
      background-size: 400% 400%;
      animation: gradientMove 15s ease infinite;
      color: #FFFFFF;
      overflow-x: hidden;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Keep all your old styles exactly as they were below */
    .container {
      text-align: center;
      padding: 40px;
      border: 1px solid rgba(244, 172, 183, 0.3); /* Subtle pink border accent */
      background: rgba(11, 19, 43, 0.75);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      max-width: 500px;
      width: 90%;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Your existing invitation content stays here -->
    <h2>Save the Date</h2>
  </div>

  <!-- Hidden Audio Element with the explicit double extension -->
  <audio id="wedding-audio" loop preload="auto">
    <source src="wedding.mp3.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById('wedding-audio');

    // Force the audio to start at second 23 as soon as it's ready to play
    audio.addEventListener('loadedmetadata', function() {
      audio.currentTime = 23;
    });

    // Backup listener to ensure it skips even on slower network connections
    audio.addEventListener('canplay', function() {
      if (audio.currentTime < 23) {
        audio.currentTime = 23;
      }
    });

    // Interaction handler to trigger play (required by modern browser security)
    document.addEventListener('click', function() {
      if (audio.paused) {
        // Double check time stamps right at the play strike
        audio.currentTime = 23;
        audio.play().catch(err => console.log("Audio playback delayed: ", err));
      }
    }, { once: true });
  </script>

</body>
</html>
